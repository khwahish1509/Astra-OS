# ─────────────────────────────────────────────────────────────────
# Astra OS — Google Cloud Build Configuration
# Builds Docker image, pushes to Artifact Registry, deploys to Cloud Run
#
# Deploy:
#   gcloud builds submit --config cloudbuild.yaml .
# ─────────────────────────────────────────────────────────────────

substitutions:
  _SERVICE:  astracoach
  _REGION:   us-central1
  _TAG:      latest

steps:
  # ── 1. Build image ────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: build
    args:
      - build
      - --tag
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/astracoach/astracoach:${_TAG}'
      - --build-arg
      - 'VITE_BACKEND_URL='
      - --cache-from
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/astracoach/astracoach:${_TAG}'
      - .

  # ── 2. Push ───────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: push
    args:
      - push
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/astracoach/astracoach:${_TAG}'

  # ── 3. Deploy to Cloud Run ────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - '${_SERVICE}'
      - --image
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/astracoach/astracoach:${_TAG}'
      - --region
      - '${_REGION}'
      - --platform
      - managed
      - --allow-unauthenticated
      - --memory
      - 1Gi
      - --cpu
      - '2'
      - --min-instances
      - '0'
      - --max-instances
      - '20'
      - --port
      - '8080'
      - --timeout
      - '3600'
      - --set-secrets
      - 'GOOGLE_API_KEY=GOOGLE_API_KEY:latest'
      - --set-env-vars
      - 'ENV=production,GEMINI_MODEL=gemini-2.5-flash-preview-native-audio-12-2025,FIRESTORE_PROJECT_ID=$PROJECT_ID,FOUNDER_ID=default_founder'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/astracoach/astracoach:${_TAG}'

timeout: '1800s'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
