  <text x="130" y="166" text-anchor="middle" fill="#94a3b8" font-size="9">Mic → PCM16 16kHz</text>
  <text x="130" y="180" text-anchor="middle" fill="#94a3b8" font-size="9">Speaker ← PCM16 24kHz</text>
  <text x="130" y="194" text-anchor="middle" fill="#64748b" font-size="8">AudioWorklet Processors</text>

  <!-- AI Avatar -->
