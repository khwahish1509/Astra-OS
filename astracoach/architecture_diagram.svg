  <text x="310" y="150" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="700">AI AVATAR</text>
  <text x="310" y="166" text-anchor="middle" fill="#94a3b8" font-size="9">FFT Lip-Sync (60fps)</text>
  <text x="310" y="180" text-anchor="middle" fill="#94a3b8" font-size="9">State Rings + Glow</text>
  <text x="310" y="194" text-anchor="middle" fill="#64748b" font-size="8">Imagen 4 Portrait</text>

